name: Secret check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  reject-likely-api-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan tracked files for likely OpenAI keys
        shell: bash
        run: |
          if git grep -nE 'sk-[A-Za-z0-9_-]{20,}' -- . ':!SECURITY.md'; then
            echo 'A likely API key was found. Revoke it and remove it from Git history.'
            exit 1
          fi
          echo 'No likely OpenAI API keys found.'
